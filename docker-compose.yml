services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hookahpos
      POSTGRES_USER: hookahpos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hookahpos}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c work_mem=4MB
      -c effective_cache_size=512MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      args:
        VITE_BASE_DOMAIN: ${BASE_DOMAIN:-lvh.me}
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://hookahpos:${DB_PASSWORD:-hookahpos}@db:5432/hookahpos
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      BASE_DOMAIN: ${BASE_DOMAIN:-lvh.me}
      PG_POOL_MAX: "20"
      PM2_INSTANCES: "4"
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs

volumes:
  pgdata:
